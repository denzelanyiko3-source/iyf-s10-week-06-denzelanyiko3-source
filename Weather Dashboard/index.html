<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="weather-app">
            <div class="app-header">
                <div>
                    <p class="eyebrow">Live weather updates</p>
                    <h1>Weather Dashboard</h1>
                    <p class="subtitle">Search any city and view the latest weather instantly.</p>
                </div>
                <button id="location-btn" type="button" class="secondary-btn">Use My Location</button>
            </div>

            <form id="search-form" class="search-form">
                <label class="sr-only" for="city-input">City name</label>
                <input
                    type="text"
                    id="city-input"
                    placeholder="Enter city name..."
                    autocomplete="off"
                    required
                >
                <button type="submit">Search</button>
            </form>

            <div id="loading" class="status hidden">Fetching weather data...</div>
            <div id="error" class="status error hidden" role="alert"></div>

            <section id="weather-display" class="weather-display hidden" aria-live="polite">
                <div class="weather-main">
                    <div>
                        <p class="current-label">Current Weather</p>
                        <h2 id="city-name"></h2>
                        <p id="description" class="description"></p>
                    </div>
                    <div class="temperature-group">
                        <img id="weather-icon" src="" alt="Weather icon">
                        <p id="temperature"></p>
                    </div>
                </div>

                <div class="weather-details">
                    <article class="detail-card">
                        <span>Feels Like</span>
                        <strong id="feels-like"></strong>
                    </article>
                    <article class="detail-card">
                        <span>Humidity</span>
                        <strong id="humidity"></strong>
                    </article>
                    <article class="detail-card">
                        <span>Wind Speed</span>
                        <strong id="wind"></strong>
                    </article>
                    <article class="detail-card">
                        <span>Pressure</span>
                        <strong id="pressure"></strong>
                    </article>
                </div>
            </section>

            <section id="recent-searches" class="recent-searches">
                <div class="section-heading">
                    <h3>Recent Searches</h3>
                    <button id="clear-history" type="button" class="clear-btn">Clear</button>
                </div>
                <div id="search-history" class="history-list">
                    <p class="empty-history">No recent searches yet.</p>
                </div>
            </section>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
